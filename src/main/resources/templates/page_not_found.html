<!DOCTYPE html>
<html lang="tr">
<head>
	<meta charset="UTF-8">
	<title>Page Not Found</title>
	<style>
	
		h1 {
			font-family: monospace;
			font-size: 40px;
			border-radius: 10px;
			border-style: solid;
			border-width: 3px;
			border-color: blue;
			padding: 1px 2px 1px 2px;
			position: absolute;
			margin: 60px 0px 0px 60px;
			transition: box-shadow 0.2s, margin 0.2s;
			transition-timing-function: ease-out;
		}
		h1:hover{
			
			box-shadow: 0px 2px 1px 0px;
			margin: 55px 0px 0px 55px;
			transition: box-shadow 0.15s, margin 0.15s;
			transition-timing-function: ease-in;
		}
		
		p{
		
			font-family: monospace;
			font-size: x-large;
			border-style: solid;
			border-color: red;
			border-width: 2px;
			border-radius: 10px;
			position: absolute;
			padding: 1px 2px 1px 2px;
			margin: 140px 0px 0px 60px;
			transition: margin 0.15s, background-color 0.15s ;
		}
		p:hover {
			background-color: rgb(230, 230, 230);
			margin: 150px 0px 0px 70px;
			transition: margin 0.15s, background-color 0.15s ;
			
		}
	</style>
</head>
<body>

	<h1>Page does not exists</h1>
	
	<p><b>It looks like the page you are looking for doesn't exists!<br> Where do you think were you going? <br>Just, just stick to
	original path would you?</b></p>

</body>
</html>
